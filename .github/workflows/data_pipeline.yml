name: CI Pipeline – ML API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python 3.10 (stable + compatible with sklearn 1.3.2)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 5️⃣ Sanity check: sklearn version
      - name: Run sanity checks
        run: |
          python - <<EOF
          import sklearn
          print("sklearn version:", sklearn.__version__)
          assert sklearn.__version__ == "1.3.2"
          EOF

      # 6️⃣ Build and Start Docker Compose Services
      - name: Build and Start Services
        run: |
          docker compose up -d --build

      # 7️⃣ Wait for API health endpoint
      - name: Wait for API health
        run: |
          timeout 60s bash -c 'until curl --silent --fail http://localhost:8000/health; do sleep 5; echo "Waiting for API..."; done'

      # 8️⃣ Test predict endpoint (valid payload)
      - name: Test predict endpoint (valid payload)
        run: |
          set -e

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "customer_id": "test_123",
              "revenue": 500.0,
              "gender": "Female",
              "seniorcitizen": "0",
              "contract": "Month-to-month",
              "tenure": 12,
              "monthlycharges": 70.0,
              "totalcharges": 840.0
            }')

          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "Status: $STATUS"
          echo "Body: $BODY"

          test "$STATUS" -eq 200
          echo "$BODY" | grep -E '"churn_probability"|\"risk_bucket\"' > /dev/null

      # 9️⃣ Test predict endpoint (invalid payload)
      - name: Test predict endpoint (invalid payload)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Invalid payload status: $STATUS"
          test "$STATUS" -eq 422

      # 🔟 Cleanup
      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true